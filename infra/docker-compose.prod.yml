services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../server/.env
    volumes:
      - cove-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cove -d cove"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - cove-redis:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    env_file:
      - ../server/.env
    command: server /data --console-address ":9001"
    volumes:
      - cove-minio:/data

  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../server/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cove
      SPRING_DATASOURCE_USERNAME: cove
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_STORAGE_ENDPOINT: http://minio:9000
      APP_STORAGE_BUCKET: cove
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

volumes:
  cove-postgres:
  cove-redis:
  cove-minio:
