server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    url: jdbc:postgresql://localhost:5432/cove
    username: cove
    password: covepass
  redis:
    host: localhost
    port: 6379
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: "dev-only-change-me-please-32chars"
    issuer: "cove"
    ttlMinutes: 43200
  otp:
    ttlSeconds: 300
    length: 6
  cors:
    allowedOrigins: "http://localhost:5173,http://127.0.0.1:5173"
  storage:
    endpoint: "http://localhost:9000"
    accessKey: "admin"
    secretKey: "adminadmin"
    bucket: "cove"
  push:
    vapidPublicKey: ""
    vapidPrivateKey: ""
    subject: "mailto:no-reply@cove.local"
  sms:
    provider: "mock"
    twilio:
      accountSid: ""
      authToken: ""
      fromNumber: ""
  email:
    provider: "smtp"
    from: "Cove <no-reply@cove.local>"
