server:
  port: ${PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cove}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:cove}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:covepass}}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-change-me-please-32chars}
    issuer: ${APP_JWT_ISSUER:cove}
    ttlMinutes: ${APP_JWT_TTL_MINUTES:43200}
  otp:
    ttlSeconds: ${APP_OTP_TTL_SECONDS:300}
    length: ${APP_OTP_LENGTH:6}
  cors:
    allowedOrigins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://cove.greatshiftai.com,https://cove-cb2.pages.dev}
  storage:
    endpoint: ${APP_STORAGE_ENDPOINT:http://localhost:9000}
    accessKey: ${APP_STORAGE_ACCESS_KEY:${MINIO_ROOT_USER:admin}}
    secretKey: ${APP_STORAGE_SECRET_KEY:${MINIO_ROOT_PASSWORD:adminadmin}}
    bucket: ${APP_STORAGE_BUCKET:cove}
  push:
    vapidPublicKey: ${APP_PUSH_VAPID_PUBLIC_KEY:}
    vapidPrivateKey: ${APP_PUSH_VAPID_PRIVATE_KEY:}
    subject: ${APP_PUSH_SUBJECT:mailto:no-reply@cove.local}
  sms:
    provider: ${APP_SMS_PROVIDER:mock}
    twilio:
      accountSid: ${APP_SMS_TWILIO_ACCOUNT_SID:}
      authToken: ${APP_SMS_TWILIO_AUTH_TOKEN:}
      fromNumber: ${APP_SMS_TWILIO_FROM_NUMBER:}
  email:
    provider: ${APP_EMAIL_PROVIDER:smtp}
    from: ${APP_EMAIL_FROM:Cove <no-reply@cove.local>}
